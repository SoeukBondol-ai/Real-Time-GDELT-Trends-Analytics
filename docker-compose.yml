name: realtime-twitter-trends

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    AIRFLOW_CONN_SPARK_DEFAULT: spark://spark-master:7077
    TRENDS_DB_HOST: postgres
    TRENDS_DB_PORT: 5432
    TRENDS_DB_NAME: ${TRENDS_DB_NAME:-trends_db}
    TRENDS_DB_USER: ${TRENDS_DB_USER:-trends}
    TRENDS_DB_PASSWORD: ${TRENDS_DB_PASSWORD:-trends}
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./logs/airflow:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./spark:/opt/airflow/spark
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: trends_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
      TRENDS_DB_USER: ${TRENDS_DB_USER:-trends}
      TRENDS_DB_PASSWORD: ${TRENDS_DB_PASSWORD:-trends}
      TRENDS_DB_NAME: ${TRENDS_DB_NAME:-trends_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U airflow -d airflow" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: trends_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.7.0
    container_name: trends_kafka
    ports:
      - "19092:19092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:19092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: trends_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      /bin/bash -c " set -e; for topic in raw-social-posts raw-news-events raw-google-trends processed-posts trend-windows-1m trend-windows-5m sentiment-alerts pipeline-errors; do
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic \"$${topic}\" --partitions 3 --replication-factor 1;
      done; /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list; "
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: trends_kafka_ui
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: trends_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio12345}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: trends_minio_init
    depends_on:
      - minio
    entrypoint: [ "sh", "-c" ]
    command: >
      "until mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minio} $${MINIO_ROOT_PASSWORD:-minio12345} && mc ready local; do
        echo 'Waiting for MinIO';
        sleep 2;
      done; mc mb --ignore-existing local/$${MINIO_BUCKET:-trends-raw}; mc anonymous set none local/$${MINIO_BUCKET:-trends-raw};"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio12345}
      MINIO_BUCKET: ${MINIO_BUCKET:-trends-raw}
    restart: "no"

  spark-master:
    image: apache/spark:3.5.1
    container_name: trends_spark_master
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8090:8080"
    volumes:
      - ./spark:/opt/spark-apps
      - ./data:/opt/project-data
    restart: unless-stopped

  spark-worker:
    image: apache/spark:3.5.1
    container_name: trends_spark_worker
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - ./spark:/opt/spark-apps
      - ./data:/opt/project-data
    depends_on:
      - spark-master
    restart: unless-stopped

  spark-trends:
    image: apache/spark:3.5.1
    container_name: trends_spark_streaming
    user: root
    command: >
      /opt/spark/bin/spark-submit --master spark://spark-master:7077 --deploy-mode client --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1,org.postgresql:postgresql:42.7.3,org.apache.hadoop:hadoop-aws:3.3.4 /opt/spark-apps/jobs/trend_streaming_job.py
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_JDBC_URL: jdbc:postgresql://postgres:5432/trends_db
      POSTGRES_USER: ${TRENDS_DB_USER:-trends}
      POSTGRES_PASSWORD: ${TRENDS_DB_PASSWORD:-trends}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio12345}
      MINIO_BUCKET: ${MINIO_BUCKET:-trends-raw}
      PYSPARK_PYTHON: python3
    volumes:
      - ./spark:/opt/spark-apps
      - ./data:/opt/project-data
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_started
      spark-worker:
        condition: service_started
    restart: unless-stopped

  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: trends_producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PRODUCER_MODE: ${PRODUCER_MODE:-bluesky,hackernews,gdelt}
      GDELT_QUERY: ${GDELT_QUERY:-(technology OR ai OR crypto OR climate OR election)}
      GDELT_POLL_SECONDS: ${GDELT_POLL_SECONDS:-15}
      HN_POLL_SECONDS: ${HN_POLL_SECONDS:-15}
      BLUESKY_JETSTREAM_URL: ${BLUESKY_JETSTREAM_URL:-wss://jetstream1.us-east.bsky.network/subscribe?wantedCollections=app.bsky.feed.post}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trends_backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://trends:trends@postgres:5432/trends_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      API_REFRESH_SECONDS: 2
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000/ws/trends}
    container_name: trends_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: trends_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins
        chmod -R 777 /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins
        airflow db migrate
        airflow users create \
          --username $${_AIRFLOW_WWW_USER_USERNAME:-admin} \
          --password $${_AIRFLOW_WWW_USER_PASSWORD:-admin} \
          --firstname Data \
          --lastname Engineer \
          --role Admin \
          --email admin@example.com || true
    environment:
      <<: *airflow-common-env
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-admin}
    user: "0:0"

  airflow-webserver:
    <<: *airflow-common
    container_name: trends_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: trends_airflow_scheduler
    command: scheduler
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8974/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: trends_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "8081:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  devcontainer:
    image: mcr.microsoft.com/devcontainers/python:3.11
    container_name: trends_devcontainer
    command: sleep infinity
    volumes:
      - .:/workspace
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://trends:trends@postgres:5432/trends_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: unless-stopped

volumes:
  postgres_data:
  kafka_data:
  minio_data:
  pgadmin_data:
